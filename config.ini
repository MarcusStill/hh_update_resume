[SETTINGS]
# Время ожидания в секундах, если сайт выдал ошибку или дизайн изменился
check_interval_seconds = 14500
fallback_interval_seconds = 14500

[RESUMES]
# Полные ссылки на резюме
resume_main = https://hh.ru/resume/...
# resume_2 = https://hh.ru

[EMAIL]
# Включить уведомления (true/false). По умолчанию false.
email_notify_enabled = false

# SMTP сервер (пример: smtp.gmail.com)
smtp_server = smtp.gmail.com
smtp_port = 587
# Логин и пароль от почтового ящика (для Gmail используйте пароль приложения)
smtp_username = your_email@gmail.com
smtp_password = your_app_password
# Кому отправлять уведомления
to_email = recipient@example.com
# Тема письма (необязательно)
subject = HH Resume Updater: требуется внимание!